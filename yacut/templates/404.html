{% extends "base.html" %}

{% block title %}Страница не найдена - YaCut{% endblock %}

{% block content %}
<section class="container my-5 px-4">
  <div class="row">
    <div class="col-sm">
    </div>
    <div class="col-sm">
      <div class="text-center">
        <h1 class="display-1 text-danger">404</h1>
        <h2 class="mb-4">Страница не найдена</h2>
        <p class="lead">К сожалению, запрошенная вами страница не существует.</p>
        <p class="mb-4">
          Возможно, вы ошиблись при вводе адреса или ссылка была удалена.
        </p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">На главную страницу</a>
      </div>
    </div>
    <div class="col-sm">
    </div>
  </div>
</section>
{% endblock %}
